<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/logo-crown.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/logo-crown.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add NASCAR Quiz — FlurrySports Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script>var supabase = (window.supabase || window.Supabase).createClient(SUPABASE_URL, SUPABASE_ANON_KEY);</script>
</head>
<body style="padding:2rem;max-width:600px;margin:0 auto;">
<h1 style="font-family:'Barlow Condensed',sans-serif;color:var(--gold);margin-bottom:1rem;">Add NASCAR Quiz</h1>
<p style="color:var(--gray);margin-bottom:2rem;">Click the button below to add the NASCAR quiz to your database. Only do this once.</p>
<button onclick="addQuiz()" class="btn btn-primary btn-lg" id="btn">Add NASCAR Quiz to Database</button>
<div style="margin-top:1rem;">
  <p style="color:var(--gray);font-size:0.85rem;margin-bottom:0.5rem;">Already created the quiz but questions failed? Use this to add questions to the existing quiz:</p>
  <button onclick="fixExistingQuiz('91eea53d-e1ac-401b-aeda-e0f3cd9f1524')" class="btn btn-outline" id="fix-btn">Fix Existing Quiz (add questions only)</button>
</div>
<div id="status" style="margin-top:1rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;"></div>

<script>
async function addQuiz() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  const quiz = {
    title: 'NASCAR Trivia Challenge',
    description: 'Think you know your way around the track? Test your NASCAR knowledge from Cup Series legends to recent champions.',
    type: 'multiple_choice',
    theme: 'NASCAR',
    is_active: true,
    timer_seconds: 20
  };

  const { data: quizData, error: quizErr } = await supabase
    .from('quizzes').insert(quiz).select().single();

  if (quizErr) {
    status.style.color = 'var(--error)';
    status.textContent = 'Error creating quiz: ' + quizErr.message;
    btn.disabled = false; btn.textContent = 'Try Again';
    return;
  }

  const qid = quizData.id;
  const questions = [
    { question_text: "Who holds the record for the most NASCAR Cup Series championships?", choices: ["Richard Petty","Dale Earnhardt","Jimmie Johnson","Jeff Gordon"], answer: "Richard Petty", points: 100 },
    { question_text: "How many total laps is the Daytona 500?", choices: ["150","175","200","250"], answer: "200", points: 100 },
    { question_text: "Which driver won the NASCAR Cup Series championship in 2020?", choices: ["Kevin Harvick","Denny Hamlin","Chase Elliott","Brad Keselowski"], answer: "Chase Elliott", points: 100 },
    { question_text: "What does NASCAR stand for?", choices: ["National Association for Stock Car Auto Racing","National American Stock Car Auto Race","North American Sports Car Auto Racing","National Automobile Stock Car Association Racing"], answer: "National Association for Stock Car Auto Racing", points: 100 },
    { question_text: "Which track is known as 'The Lady in Black'?", choices: ["Talladega Superspeedway","Bristol Motor Speedway","Darlington Raceway","Charlotte Motor Speedway"], answer: "Darlington Raceway", points: 100 },
    { question_text: "Who is known as 'The Intimidator' in NASCAR history?", choices: ["Richard Petty","Dale Earnhardt Sr.","Tony Stewart","Rusty Wallace"], answer: "Dale Earnhardt Sr.", points: 100 },
    { question_text: "Which manufacturer has the most NASCAR Cup Series wins all-time?", choices: ["Ford","Chevrolet","Dodge","Toyota"], answer: "Chevrolet", points: 100 },
    { question_text: "Kyle Busch won his first NASCAR Cup Series title in which year?", choices: ["2013","2015","2019","2021"], answer: "2015", points: 100 },
    { question_text: "Which superspeedway is located in Talladega, Alabama?", choices: ["Bristol Motor Speedway","Daytona International Speedway","Talladega Superspeedway","Atlanta Motor Speedway"], answer: "Talladega Superspeedway", points: 100 },
    { question_text: "Which driver won the 2023 NASCAR Cup Series championship?", choices: ["Ryan Blaney","William Byron","Christopher Bell","Denny Hamlin"], answer: "Ryan Blaney", points: 100 },
  ].map(q => ({ ...q, quiz_id: qid, type: 'multiple_choice' }));

  const { error: qErr } = await supabase.from('questions').insert(questions);
  if (qErr) {
    status.style.color = 'var(--error)';
    status.textContent = 'Quiz created but questions failed: ' + qErr.message + '. Quiz ID: ' + qid;
    return;
  }

  status.style.color = 'var(--success)';
  status.innerHTML = '✅ NASCAR Quiz added! Quiz ID: <strong>' + qid + '</strong><br><a href="/quiz.html?id=' + qid + '" style="color:var(--gold);">Play it now →</a> or <a href="/quizzes.html" style="color:var(--gold);">view all quizzes →</a>';
  btn.textContent = 'Done!';
  }

  async function fixExistingQuiz(qid) {
    const btn = document.getElementById('fix-btn');
    const status = document.getElementById('status');
    btn.disabled = true; btn.textContent = 'Adding questions...';

    const questions = [
      { question_text: "Who holds the record for the most NASCAR Cup Series championships?", choices: ["Richard Petty","Dale Earnhardt","Jimmie Johnson","Jeff Gordon"], answer: "Richard Petty", points: 100 },
      { question_text: "How many total laps is the Daytona 500?", choices: ["150","175","200","250"], answer: "200", points: 100 },
      { question_text: "Which driver won the NASCAR Cup Series championship in 2020?", choices: ["Kevin Harvick","Denny Hamlin","Chase Elliott","Brad Keselowski"], answer: "Chase Elliott", points: 100 },
      { question_text: "What does NASCAR stand for?", choices: ["National Association for Stock Car Auto Racing","National American Stock Car Auto Race","North American Sports Car Auto Racing","National Automobile Stock Car Association Racing"], answer: "National Association for Stock Car Auto Racing", points: 100 },
      { question_text: "Which track is known as 'The Lady in Black'?", choices: ["Talladega Superspeedway","Bristol Motor Speedway","Darlington Raceway","Charlotte Motor Speedway"], answer: "Darlington Raceway", points: 100 },
      { question_text: "Who is known as 'The Intimidator' in NASCAR history?", choices: ["Richard Petty","Dale Earnhardt Sr.","Tony Stewart","Rusty Wallace"], answer: "Dale Earnhardt Sr.", points: 100 },
      { question_text: "Which manufacturer has the most NASCAR Cup Series wins all-time?", choices: ["Ford","Chevrolet","Dodge","Toyota"], answer: "Chevrolet", points: 100 },
      { question_text: "Kyle Busch won his first NASCAR Cup Series title in which year?", choices: ["2013","2015","2019","2021"], answer: "2015", points: 100 },
      { question_text: "Which superspeedway is located in Talladega, Alabama?", choices: ["Bristol Motor Speedway","Daytona International Speedway","Talladega Superspeedway","Atlanta Motor Speedway"], answer: "Talladega Superspeedway", points: 100 },
      { question_text: "Which driver won the 2023 NASCAR Cup Series championship?", choices: ["Ryan Blaney","William Byron","Christopher Bell","Denny Hamlin"], answer: "Ryan Blaney", points: 100 },
    ].map(q => ({ ...q, quiz_id: qid, type: 'multiple_choice' }));

    const { error } = await supabase.from('questions').insert(questions);
    if (error) {
      status.style.color = 'var(--error)';
      status.textContent = 'Error adding questions: ' + error.message;
      btn.disabled = false; btn.textContent = 'Try Again';
      return;
    }
    status.style.color = 'var(--success)';
    status.innerHTML = '✅ Questions added to existing quiz!<br><a href="/quiz.html?id=' + qid + '" style="color:var(--gold);">Play it now →</a>';
    btn.textContent = 'Done!';
  }
</script>
</body>
</html>
