<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add NASCAR Quiz — FlurrySports Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script>var supabase = (window.supabase || window.Supabase).createClient(SUPABASE_URL, SUPABASE_ANON_KEY);</script>
</head>
<body style="padding:2rem;max-width:600px;margin:0 auto;">
<h1 style="font-family:'Barlow Condensed',sans-serif;color:var(--gold);margin-bottom:1rem;">Add NASCAR Quiz</h1>
<p style="color:var(--gray);margin-bottom:2rem;">Click the button below to add the NASCAR quiz to your database. Only do this once.</p>
<button onclick="addQuiz()" class="btn btn-primary btn-lg" id="btn">Add NASCAR Quiz to Database</button>
<div id="status" style="margin-top:1rem;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;"></div>

<script>
async function addQuiz() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  const quiz = {
    title: 'NASCAR Trivia Challenge',
    description: 'Think you know your way around the track? Test your NASCAR knowledge from Cup Series legends to recent champions.',
    type: 'multiple_choice',
    theme: 'NASCAR',
    is_active: true,
    timer_seconds: 20
  };

  const { data: quizData, error: quizErr } = await supabase
    .from('quizzes').insert(quiz).select().single();

  if (quizErr) {
    status.style.color = 'var(--error)';
    status.textContent = 'Error creating quiz: ' + quizErr.message;
    btn.disabled = false; btn.textContent = 'Try Again';
    return;
  }

  const qid = quizData.id;
  const questions = [
    { question: "Who holds the record for the most NASCAR Cup Series championships?", options: ["Richard Petty","Dale Earnhardt","Jimmie Johnson","Jeff Gordon"], correct_answer: "Richard Petty", sort_order: 1 },
    { question: "How many total laps is the Daytona 500?", options: ["150","175","200","250"], correct_answer: "200", sort_order: 2 },
    { question: "Which driver won the NASCAR Cup Series championship in 2020?", options: ["Kevin Harvick","Denny Hamlin","Chase Elliott","Brad Keselowski"], correct_answer: "Chase Elliott", sort_order: 3 },
    { question: "What does NASCAR stand for?", options: ["National Association for Stock Car Auto Racing","National American Stock Car Auto Race","North American Sports Car Auto Racing","National Automobile Stock Car Association Racing"], correct_answer: "National Association for Stock Car Auto Racing", sort_order: 4 },
    { question: "Which track is known as 'The Lady in Black'?", options: ["Talladega Superspeedway","Bristol Motor Speedway","Darlington Raceway","Charlotte Motor Speedway"], correct_answer: "Darlington Raceway", sort_order: 5 },
    { question: "Who is known as 'The Intimidator' in NASCAR history?", options: ["Richard Petty","Dale Earnhardt Sr.","Tony Stewart","Rusty Wallace"], correct_answer: "Dale Earnhardt Sr.", sort_order: 6 },
    { question: "Which manufacturer has the most NASCAR Cup Series wins all-time?", options: ["Ford","Chevrolet","Dodge","Toyota"], correct_answer: "Chevrolet", sort_order: 7 },
    { question: "Kyle Busch won his first NASCAR Cup Series title in which year?", options: ["2013","2015","2019","2021"], correct_answer: "2015", sort_order: 8 },
    { question: "Which superspeedway is located in Talladega, Alabama?", options: ["Bristol Motor Speedway","Daytona International Speedway","Talladega Superspeedway","Atlanta Motor Speedway"], correct_answer: "Talladega Superspeedway", sort_order: 9 },
    { question: "Which driver won the 2023 NASCAR Cup Series championship?", options: ["Ryan Blaney","William Byron","Christopher Bell","Denny Hamlin"], correct_answer: "Ryan Blaney", sort_order: 10 },
  ].map(q => ({ ...q, quiz_id: qid, type: 'multiple_choice' }));

  const { error: qErr } = await supabase.from('questions').insert(questions);
  if (qErr) {
    status.style.color = 'var(--error)';
    status.textContent = 'Quiz created but questions failed: ' + qErr.message + '. Quiz ID: ' + qid;
    return;
  }

  status.style.color = 'var(--success)';
  status.innerHTML = '✅ NASCAR Quiz added! Quiz ID: <strong>' + qid + '</strong><br><a href="/quiz.html?id=' + qid + '" style="color:var(--gold);">Play it now →</a> or <a href="/quizzes.html" style="color:var(--gold);">view all quizzes →</a>';
  btn.textContent = 'Done!';
}
</script>
</body>
</html>
