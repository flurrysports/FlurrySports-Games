<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — FlurrySports Games</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/supabase-config.js"></script>
  <script>
    (function() {
      var _lib = window.supabase || window.Supabase;
      var _create = _lib.createClient || (_lib.default && _lib.default.createClient);
      window.supabase = _create(SUPABASE_URL, SUPABASE_ANON_KEY);
    })();
  </script>
  <style>
    .reset-shell {
      max-width: 420px; margin: 6rem auto; padding: 0 1.5rem;
      text-align: center; position: relative; z-index: 1;
    }
    .reset-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 2.5rem 2rem;
    }
    .reset-card img { height: 60px; margin-bottom: 1.5rem; }
    .reset-card h2 {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
      font-size: 1.8rem; text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .reset-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .reset-error { color: var(--error); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .reset-success { color: var(--success); font-size: 0.95rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><img src="/images/logo-yeti-orange.png" alt="FlurrySports" style="height:48px;width:auto;"></a>
</nav>

<div class="reset-shell">
  <div class="reset-card">
    <img src="/images/logo-icon-gold.png" alt="FlurrySports">
    <h2>Set New Password</h2>
    <p>Enter your new password below.</p>

    <div class="reset-error" id="reset-error"></div>
    <div class="reset-success" id="reset-success"></div>

    <div id="reset-form">
      <div class="form-group" style="text-align:left;margin-bottom:1rem;">
        <label class="form-label">New Password</label>
        <input class="form-input" id="new-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="form-group" style="text-align:left;margin-bottom:1.5rem;">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" id="reset-btn" onclick="doReset()">
        Update Password
      </button>
    </div>

    <div id="reset-done" style="display:none;">
      <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
      <p style="color:var(--success);font-weight:600;margin-bottom:1.5rem;">Password updated successfully!</p>
      <a href="/" class="btn btn-primary" style="justify-content:center;">Back to Games</a>
    </div>
  </div>
</div>

<script>
  async function doReset() {
    const pw  = document.getElementById('new-password').value;
    const pw2 = document.getElementById('confirm-password').value;
    const errEl = document.getElementById('reset-error');
    const btn   = document.getElementById('reset-btn');

    errEl.style.display = 'none';

    if (!pw || pw.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.style.display = 'block';
      return;
    }
    if (pw !== pw2) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await window.supabase.auth.updateUser({ password: pw });

    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Update Password';
      return;
    }

    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('reset-done').style.display = 'block';
  }

  // Check that we have a valid session from the reset link
  window.addEventListener('DOMContentLoaded', async function() {
    const { data: { session } } = await window.supabase.auth.getSession();
    if (!session) {
      document.getElementById('reset-form').style.display = 'none';
      const errEl = document.getElementById('reset-error');
      errEl.textContent = 'This reset link has expired or is invalid. Please request a new one.';
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
