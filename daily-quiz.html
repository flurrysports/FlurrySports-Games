<script>
// ── Pacific seed (plain date, no salt) ───────────────────
function getPacificOffsetMinutes(d) {
  var y = d.getUTCFullYear();
  var ds = new Date(Date.UTC(y,2,14-(new Date(Date.UTC(y,2,1)).getUTCDay()+6)%7,10));
  var de = new Date(Date.UTC(y,10,7-(new Date(Date.UTC(y,10,1)).getUTCDay()+6)%7,9));
  return (d>=ds && d<de) ? -420 : -480;
}
function dateSeed() {
  var d = new Date();
  var pac = new Date(d.getTime() + getPacificOffsetMinutes(d)*60000);
  return parseInt(pac.toISOString().slice(0,10).replace(/-/g,''));
}
function getPacificDateString() {
  var d = new Date();
  var pac = new Date(d.getTime() + getPacificOffsetMinutes(d)*60000);
  return pac.toISOString().slice(0,10);
}
// Returns a sequential day index (days since 2025-01-01) so theme rotation
// never collides at month boundaries. Using date integers like 20260331 % 14
// breaks because month rollovers jump by 70, which is a multiple of 14.
function dayIndex() {
  var d = new Date();
  var pac = new Date(d.getTime() + getPacificOffsetMinutes(d)*60000);
  var pacDateStr = pac.toISOString().slice(0,10);
  var epoch = new Date('2025-01-01T00:00:00Z');
  return Math.floor((new Date(pacDateStr + 'T00:00:00Z') - epoch) / 86400000);
}
function seededRandom(seed) {
  var s = seed;
  return function() { s=(s*9301+49297)%233280; return s/233280; };
}

// ── Quiz questions ────────────────────────────────────────
var QUIZ_THEMES = [
  { theme:'NFL Legends',              emoji:'🏈', questions: q_nfl_legends },
  { theme:'NBA History',              emoji:'🏀', questions: q_nba_history },

  { theme:'Sports Records',           emoji:'📊', questions: q_sports_records },
  { theme:'Fantasy Football',         emoji:'🎯', questions: q_fantasy },

  { theme:'Heisman Winners',          emoji:'🎓', questions: q_heisman },
];
function q_nfl_legends() { return [{q:"How many Super Bowl titles did Tom Brady win?",o:["5","6","7","8"],c:2},{q:"Jerry Rice won most of his Super Bowls with which team?",o:["Dallas Cowboys","San Francisco 49ers","Oakland Raiders","Green Bay Packers"],c:1},{q:"Who holds the NFL record for most career rushing yards?",o:["Emmitt Smith","Barry Sanders","Walter Payton","Adrian Peterson"],c:0},{q:"What year did the New Orleans Saints win their only Super Bowl?",o:["2008","2009","2010","2011"],c:2},{q:"Which QB threw for 5 TDs in Super Bowl LV?",o:["Patrick Mahomes","Aaron Rodgers","Tom Brady","Josh Allen"],c:2}]; }

function q_nba_awards() { return [{q:"Who won the 2023-24 NBA MVP?",o:["Luka Doncic","Nikola Jokic","Giannis Antetokounmpo","Shai Gilgeous-Alexander"],c:1},{q:"Who won the 2016 NBA Defensive Player of the Year?",o:["Rudy Gobert","Draymond Green","Kawhi Leonard","Avery Bradley"],c:1},{q:"Who has won the most NBA scoring titles?",o:["Michael Jordan","LeBron James","Kobe Bryant","Kevin Durant"],c:0},{q:"Who was the 2019 NBA Finals MVP?",o:["Kevin Durant","Klay Thompson","Kawhi Leonard","Steph Curry"],c:2},{q:"Giannis won back-to-back MVPs in which seasons?",o:["2017-18 & 2018-19","2018-19 & 2019-20","2019-20 & 2020-21","2016-17 & 2017-18"],c:1}]; }

function q_fantasy() { return [{q:"In standard PPR, how many points is a reception worth?",o:["0","0.5","1","1.5"],c:2},{q:"Which passing milestone earns a QB a bonus in most formats?",o:["200 yards","300 yards","400 yards","100 yards"],c:1},{q:"Which position typically has the highest fantasy pts per game?",o:["Wide Receiver","Running Back","Quarterback","Tight End"],c:2},{q:"A defensive TD typically scores how many fantasy points?",o:["4","6","8","10"],c:1},{q:"What does FAAB stand for?",o:["Free Agent Auction Budget","Fantasy All Around Base","Free Agency Allowance Bid","Fantasy All Access Bonus"],c:0}]; }
function q_mlb() { return [{q:"Who holds the all-time MLB record for career home runs?",o:["Babe Ruth","Hank Aaron","Barry Bonds","Alex Rodriguez"],c:2},{q:"Which team has won the most World Series championships?",o:["Boston Red Sox","Los Angeles Dodgers","New York Yankees","St. Louis Cardinals"],c:2},{q:"Who was the last player to hit .400 in a single MLB season?",o:["Joe DiMaggio","Ted Williams","Mickey Mantle","Stan Musial"],c:1},{q:"Which city's team broke an 86-year World Series drought in 2004?",o:["Chicago","Boston","Cleveland","Detroit"],c:1},{q:"How many balls equal a walk in MLB?",o:["3","4","5","6"],c:1}]; }
function q_nhl() { return [{q:"Who is the NHL's all-time leading scorer?",o:["Mario Lemieux","Gordie Howe","Wayne Gretzky","Jaromir Jagr"],c:2},{q:"How many Stanley Cups have the Montreal Canadiens won?",o:["19","21","24","27"],c:2},{q:"Wayne Gretzky played most of his career with which team?",o:["Edmonton Oilers","Los Angeles Kings","New York Rangers","St. Louis Blues"],c:0},{q:"How many skaters (excluding goalie) are on the ice per team?",o:["4","5","6","7"],c:1},{q:"What trophy is awarded to the NHL regular season MVP?",o:["Vezina Trophy","Norris Trophy","Hart Trophy","Conn Smythe Trophy"],c:2}]; }
function q_college() { return [{q:"Which school has the most Heisman Trophy winners?",o:["Ohio State","USC","Notre Dame","Alabama"],c:1},{q:"Which coach has the most wins in college football history?",o:["Bear Bryant","Nick Saban","Bobby Bowden","Joe Paterno"],c:3},{q:"What conference is the SEC?",o:["South Eastern Conference","Southern Elite Conference","Southeastern Conference","Southern Excellence Conference"],c:2},{q:"Which team won the first CFP National Championship in 2015?",o:["Alabama","Florida State","Oregon","Ohio State"],c:3},{q:"The Rose Bowl is located in which California city?",o:["Los Angeles","Pasadena","Anaheim","San Diego"],c:1}]; }

function q_nba_champs() { return [{q:"Which team won the 2023 NBA Championship?",o:["Boston Celtics","Golden State Warriors","Miami Heat","Denver Nuggets"],c:3},{q:"How many titles did the Chicago Bulls win in the 1990s?",o:["4","5","6","7"],c:2},{q:"Who was the 2023 NBA Finals MVP?",o:["Jamal Murray","Nikola Jokic","Aaron Gordon","Michael Porter Jr."],c:1},{q:"Which team has the most NBA championships of all time?",o:["Los Angeles Lakers","Chicago Bulls","Boston Celtics","Golden State Warriors"],c:2},{q:"The Warriors won how many titles from 2015-2022?",o:["3","4","5","6"],c:1}]; }
function q_nfl_mvps() { return [{q:"Who has won the most NFL MVP awards?",o:["Tom Brady","Peyton Manning","Brett Favre","Patrick Mahomes"],c:1},{q:"Which position has won the most NFL MVPs historically?",o:["Running Back","Wide Receiver","Quarterback","Tight End"],c:2},{q:"Patrick Mahomes won his first MVP in which season?",o:["2017","2018","2019","2020"],c:1},{q:"Who won NFL MVP in the 2022 season?",o:["Josh Allen","Patrick Mahomes","Justin Jefferson","Jalen Hurts"],c:1},{q:"Lamar Jackson won back-to-back MVPs in which years?",o:["2018 & 2019","2019 & 2020","2022 & 2023","2023 & 2024"],c:3}]; }
function q_heisman() { return [{q:"Who won the Heisman Trophy in 2023?",o:["Bo Nix","Drake Maye","Jayden Daniels","Michael Penix Jr."],c:2},{q:"Which school has produced the most Heisman winners?",o:["Ohio State","Notre Dame","USC","Alabama"],c:2},{q:"Who was the first player to win the Heisman Trophy twice?",o:["Archie Griffin","Barry Sanders","Tim Tebow","Marcus Allen"],c:0},{q:"Lamar Jackson won the Heisman at which school?",o:["Alabama","Florida","Louisville","Clemson"],c:2},{q:"Tim Tebow won the Heisman playing for which school?",o:["Florida","Alabama","LSU","Georgia"],c:0}]; }

// ── Today's quiz ─────────────────────────────────────────
var seed   = dateSeed();
var quizId = 'daily-quiz-' + seed;
// theme and qs are set after Supabase fetch (or fallback)
var theme  = QUIZ_THEMES[dayIndex() % QUIZ_THEMES.length]; // fallback
var qs     = theme.questions();                             // fallback

// ── Storage: ONE key, ONE approach ───────────────────────
// Key: 'dq_result_YYYYMMDD' — uses date string not quizId to survive seed formula changes
var storageKey = 'dq_result_' + seed;

function saveResult(data) {
  try { localStorage.setItem(storageKey, JSON.stringify(data)); } catch(e) {}
}
function loadResult() {
  try {
    // Check new key first
    var r = localStorage.getItem(storageKey);
    if (r) return JSON.parse(r);
    // Fallback: check ALL old key formats this quiz may have been stored under
    var oldKeys = [
      'fs_r_daily-quiz-' + seed,          // no-salt key
      'fs_r_daily-quiz-' + (seed + 166),  // +166 salt key
      'fs_r_daily-quiz-' + (seed + 56),   // other salt attempts
      'fs_result_daily-quiz-' + seed,     // alternate prefix
    ];
    for (var i = 0; i < oldKeys.length; i++) {
      var r2 = localStorage.getItem(oldKeys[i]);
      if (r2) {
        // Migrate to new key
        localStorage.setItem(storageKey, r2);
        return JSON.parse(r2);
      }
    }
    return null;
  } catch(e) { return null; }
}
function markPlayed() {
  try { localStorage.setItem('dq_played_' + seed, '1'); } catch(e) {}
}
function hasPlayed() {
  if (localStorage.getItem('dq_played_' + seed) === '1') return true;
  // Also check old fs_attempted array
  try {
    var attempted = JSON.parse(localStorage.getItem('fs_attempted') || '[]');
    return attempted.includes('daily-quiz-' + seed) || 
           attempted.includes('daily-quiz-' + (seed + 166)) ||
           attempted.includes('daily-quiz-' + (seed + 56));
  } catch(e) { return false; }
}

// ── Game state ───────────────────────────────────────────
var TIMER = 15, MAX_PTS = 200;
var curQ = 0, totalScore = 0, timerInt = null, tLeft = TIMER;
var qStart = 0, results = [];
var letters = ['A','B','C','D'];

// ── Render ───────────────────────────────────────────────
function hdr() {
  var dots = qs.map(function(_,i) {
    var cls = i < curQ ? (results[i] && results[i].ok ? 'done-correct' : 'done-wrong') : (i===curQ ? 'active' : '');
    return '<div class="progress-dot ' + cls + '" id="dot-' + i + '"></div>';
  }).join('');
  return '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;">' +
    '<span style="font-size:1.5rem;">' + theme.emoji + '</span>' +
    '<div><div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:1.4rem;text-transform:uppercase;">Daily Quiz</div>' +
    '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;color:var(--gray);text-transform:uppercase;">' + theme.theme + '</div></div>' +
    '</div><div class="progress-dots">' + dots + '</div>';
}

function renderQ(idx) {
  var q = qs[idx];
  document.getElementById('quiz-container').innerHTML = hdr() +
    '<div class="q-card">' +
      '<div class="q-header"><span class="q-number">Question ' + (idx+1) + ' of ' + qs.length + '</span>' +
      '<span style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;color:var(--gold);" id="ttxt">' + TIMER + 's</span></div>' +
      '<div class="q-timer-bar"><div class="q-timer-fill" id="tfill" style="width:100%;"></div></div>' +
      '<div class="q-text">' + q.q + '</div>' +
      '<div class="q-options" id="opts">' +
        q.o.map(function(opt,i) {
          return '<button class="q-option" onclick="pick(' + i + ')" id="opt-' + i + '">' +
            '<span class="q-letter">' + letters[i] + '</span>' + opt + '</button>';
        }).join('') +
      '</div>' +
      '<div class="q-pts-flash" id="flash"></div>' +
    '</div>';
  startTimer();
}

function startTimer() {
  tLeft = TIMER; qStart = Date.now();
  clearInterval(timerInt);
  timerInt = setInterval(function() {
    tLeft = Math.max(0, TIMER - (Date.now()-qStart)/1000);
    var fill = document.getElementById('tfill');
    var txt  = document.getElementById('ttxt');
    if (fill) { fill.style.width = (tLeft/TIMER*100)+'%'; if(tLeft<=4) fill.classList.add('urgent'); }
    if (txt) txt.textContent = Math.ceil(tLeft)+'s';
    if (tLeft <= 0) { clearInterval(timerInt); pick(-1); }
  }, 100);
}

function pick(chosen) {
  clearInterval(timerInt);
  var dt = (Date.now()-qStart)/1000;
  var q  = qs[curQ];
  var ok = chosen === q.c;
  var pts = ok ? Math.round(MAX_PTS * Math.max(0,(TIMER-dt)/TIMER)) : 0;
  if (ok) totalScore += pts;
  results.push({ ok:ok, pts:pts });
  var dot = document.getElementById('dot-' + curQ);
  if (dot) { dot.classList.remove('active'); dot.classList.add(ok?'done-correct':'done-wrong'); }
  for (var i=0; i<q.o.length; i++) {
    var btn = document.getElementById('opt-'+i);
    if (!btn) continue;
    btn.disabled = true;
    if (i===q.c) btn.classList.add('correct');
    else if (i===chosen) btn.classList.add('wrong');
  }
  var fl = document.getElementById('flash');
  if (fl) fl.textContent = ok ? '+' + pts + ' pts' : (chosen===-1 ? "Time's Up!" : 'No points');
  setTimeout(function() {
    curQ++;
    if (curQ < qs.length) renderQ(curQ);
    else showResults(null);
  }, 1200);
}

// ── Results ───────────────────────────────────────────────
async function showResults(stored) {
  var isReplay = stored !== null && stored !== undefined;
  var correct    = isReplay ? stored.correct    : results.filter(function(r){return r.ok;}).length;
  var emojiRow   = isReplay ? stored.emojiRow   : results.map(function(r){return r.ok?'✅':'❌';}).join('');
  var finalScore = isReplay ? stored.finalScore : (isOnFire() ? Math.round(totalScore*1.10) : totalScore);

  if (!isReplay) {
    // Save to localStorage FIRST — always works regardless of Supabase
    saveResult({ correct:correct, emojiRow:emojiRow, finalScore:finalScore });
    markPlayed();
    updateStreak();
    // Then save to Supabase
    await saveAttempt(quizId, totalScore, 0, results, 'trivia');
  }

  var pctHtml = '';
  try {
    var pct = await getPercentile(quizId, finalScore);
    if (pct !== null) pctHtml = '<div class="percentile-badge">Better than ' + pct + '% of players today</div>';
  } catch(e) {}

  document.getElementById('quiz-container').innerHTML =
    '<div class="results-card">' +
      '<div style="font-size:2rem;margin-bottom:0.5rem;">' + theme.emoji + '</div>' +
      '<div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;color:var(--gold);">Quiz Complete!</div>' +
      (isOnFire() && !isReplay ? '<div style="font-size:0.8rem;color:#ff6400;font-family:Barlow Condensed,sans-serif;font-weight:700;text-transform:uppercase;margin-bottom:0.25rem;">🔥 On Fire! +10% bonus applied</div>' : '') +
      '<div class="results-score">' + finalScore.toLocaleString() + '</div>' +
      '<div class="results-label">' + correct + ' of ' + qs.length + ' correct</div>' +
      '<div style="margin:1rem 0;font-size:1.5rem;letter-spacing:0.2rem;">' + emojiRow + '</div>' +
      pctHtml +
      buildShareSection('Daily Quiz — ' + theme.theme, finalScore, correct + '/' + qs.length + ' correct') +
      '<div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin:0.75rem 0;">' +
        '<a href="/" class="btn btn-outline">Back to Games</a>' +
      '</div>' +
      '<div style="border-top:1px solid var(--card-border);padding-top:1.25rem;margin-top:0.5rem;">' +
        '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-bottom:0.75rem;">Try Today\'s Other Games</div>' +
        '<div class="other-games">' +
          '<a href="/snap-decision.html" class="other-game-btn">🏈 Snap Decision</a>' +
          '<a href="/whos-that-player.html" class="other-game-btn">❓ Who\'s That, Player?</a>' +
        '</div>' +
      '</div>' +
    '</div>';

  if (!isReplay) {
    var user = await getCurrentUser();
    if (!user) setTimeout(function() {
      showPostGameAuthPrompt(quizId, finalScore, 'trivia', 'Daily Quiz — ' + theme.theme);
    }, 600);
  }
}

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  updateNavAuth();

  // Try to fetch today's AI-generated quiz from Supabase
  try {
    var today = getPacificDateString();
    var fetchP = supabase
      .from('daily_quizzes')
      .select('*')
      .eq('date', today)
      .single();
    var timeoutP = new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error('timeout')); }, 4000);
    });
    var result = await Promise.race([fetchP, timeoutP]);
    var data = result.data;
    if (data && data.questions && data.questions.length === 5) {
      // Override with AI-generated quiz
      theme = { theme: data.theme, emoji: data.emoji || '🎯' };
      qs = data.questions; // [{q, o:[4], c:index}]
      console.log('DQ: loaded AI quiz from Supabase — theme:', data.theme);
    } else {
      console.log('DQ: no Supabase quiz found, using hardcoded fallback');
    }
  } catch(e) {
    console.log('DQ: Supabase fetch failed, using hardcoded fallback:', e.message);
  }

  console.log('DQ Init: seed=' + seed + ' theme=' + theme.theme);

  var stored = loadResult();
  if (stored) {
    showResults(stored);
    return;
  }

  var played = hasPlayed();
  if (played) {
    showResults({ correct: 0, emojiRow: '—', finalScore: 0 });
    return;
  }

  showCountdown(function() { renderQ(0); });
});
</script>
<script>
// ── TECHNICAL FOUL: fires when player leaves the game ──
(function() {
  var _tfTriggered = false;

  function _isGameActive() {
    try { return typeof curQ !== 'undefined' && curQ < 5 && typeof timerInt !== 'undefined' && timerInt !== null; } catch(e) { return false; }
  }

  function _getCurrentScore() {
    try { return typeof totalScore !== 'undefined' ? totalScore : 0; } catch(e) { return 0; }
  }

  function _endGame() {
    try { if(typeof timerInt !== 'undefined' && timerInt){ clearInterval(timerInt); timerInt=null; } } catch(e) {}
  }

  function _showTechFoul() {
    if (_tfTriggered) return;
    if (!_isGameActive()) return;
    _tfTriggered = true;
    var score = _getCurrentScore();
    _endGame();
    var el = document.getElementById('tf-final-score');
    if (el) el.textContent = score.toLocaleString();
    var overlay = document.getElementById('tech-foul-overlay');
    if (overlay) { overlay.style.cssText = 'display:flex !important; position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100% !important; height:100% !important; min-height:100vh !important; z-index:999999 !important; background:rgba(0,0,0,0.95) !important; align-items:center !important; justify-content:center !important; flex-direction:column !important; text-align:center !important; padding:2rem !important; box-sizing:border-box !important;'; overlay.classList.add('active'); }
    // Save the attempt as a loss/forfeit
    try {
      if (typeof saveAttempt === 'function') {
        saveAttempt(typeof quizId !== 'undefined' ? quizId : (typeof todayGameId !== 'undefined' ? todayGameId : 'unknown'), score, 0, {forfeit: true}, 'forfeit');
      }
    } catch(e) {}
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') _showTechFoul();
  });

  window.addEventListener('blur', function() {
    // Small delay to avoid false positives from clicking within the page
    setTimeout(function() {
      if (document.visibilityState === 'hidden' || !document.hasFocus()) _showTechFoul();
    }, 300);
  });
})();
</script>
