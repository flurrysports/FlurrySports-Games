function getPacificOffsetMinutes(d) {
    const y = d.getUTCFullYear();
    const dstStart = new Date(Date.UTC(y, 2, 14 - (new Date(Date.UTC(y, 2, 1)).getUTCDay() + 6) % 7, 10));
    const dstEnd   = new Date(Date.UTC(y, 10, 7  - (new Date(Date.UTC(y, 10, 1)).getUTCDay() + 6) % 7, 9));
    return (d >= dstStart && d < dstEnd) ? -7*60 : -8*60;
  }
  function dateSeed(offsetDays) {
    const d = new Date();
    if (offsetDays) d.setUTCDate(d.getUTCDate() + offsetDays);
    const ms = getPacificOffsetMinutes(d) * 60000;
    const pac = new Date(d.getTime() + ms);
    return parseInt(pac.toISOString().slice(0,10).replace(/-/g,''));
  }
  function seededRandom(seed) {

  const POINT_VALUES = [1000, 800, 600, 400, 200];

  function getDailyPlayer() {
    const seed = dateSeed();
    const rng = seededRandom(seed + 7);
    const useNFL = rng() > 0.5;
    const pool = useNFL ? NFL_PLAYERS : NBA_PLAYERS;
    const idx = Math.floor(rng() * pool.length);
    return { ...pool[idx], league: useNFL ? 'NFL' : 'NBA', id: `wtp-${seed}` };
  }

    container.innerHTML = `
      <div class="wtp-hero">
        <div class="wtp-hero-top">
          <div class="wtp-brand">
            <div class="wtp-brand-icon">❓</div>
            <div>
              <div class="wtp-brand-name">Who's That, Player?</div>
              <div class="wtp-brand-sub">by FlurrySports · Daily Challenge</div>
            </div>
          </div>
          <span class="wtp-league-badge" style="background:${leagueBg()};color:${leagueColor()};border:1px solid ${leagueColor()}33;">${player.league} · Active Player</span>
        </div>

        <div class="wtp-body">
          <div class="wtp-silhouette-panel">
            <div class="wtp-who-label">Who's That, Player?</div>
            <div class="wtp-silhouette-wrap">
              <img class="wtp-player-img" id="silhouette-img"
                src="${espnImg}"
                alt="mystery player"
                onerror="this.style.display='none';document.getElementById('fallback-svg').style.display='block';"
              />
              <svg id="fallback-svg" style="display:none;width:100%;height:100%;" viewBox="0 0 140 185" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="70" cy="28" rx="22" ry="24" fill="#0a1520"/>
                <path d="M48 50 Q38 65 35 90 L43 92 Q46 74 52 65 L52 130 L42 130 L36 185 L50 185 L58 138 L70 138 L82 138 L90 185 L104 185 L98 130 L88 130 L88 65 Q94 74 97 92 L105 90 Q102 65 92 50 Z" fill="#0a1520"/>
                <ellipse cx="70" cy="50" rx="22" ry="6" fill="#0a1520"/>
                <path d="M35 90 Q28 115 30 140 L42 138 Q40 116 43 92 Z" fill="#08111a"/>
                <path d="M105 90 Q112 115 110 140 L98 138 Q100 116 97 92 Z" fill="#08111a"/>
              </svg>
              <div class="wtp-glow"></div>
            </div>
            <div class="wtp-qmarks" id="qmarks">? ? ?</div>
          </div>

          <div class="wtp-clues-panel">
            <div class="wtp-clues-header">
              <span class="wtp-clues-title">Clues Revealed</span>
              <span class="wtp-clue-count" id="clue-count-display">${revealedClues} of 5</span>
            </div>
            <div id="clues-list"></div>
          </div>
        </div>

        <div class="wtp-guess-section">
          <div class="wtp-guess-label">Your Guess</div>
          <div class="wtp-guess-row">
            <input class="wtp-guess-input" id="guess-input" type="text" placeholder="Type a player name..." autocomplete="off" />
            <button class="wtp-guess-btn" onclick="submitGuess()">Guess</button>
          </div>
          <button class="wtp-reveal-btn" id="reveal-btn" onclick="revealNextClue()">
            Reveal Next Clue (−${POINT_VALUES[0] - POINT_VALUES[Math.min(revealedClues, 4)]} pts available after)
          </button>
          <div class="guess-feedback" id="guess-feedback"></div>
        </div>

        <div class="wtp-score-strip">
          <div class="wtp-score-item">
            <div class="wtp-score-val" id="pts-available" style="color:${leagueColor()};">${POINT_VALUES[0].toLocaleString()}</div>
            <div class="wtp-score-lbl">Points Available</div>
          </div>
          <div class="wtp-divider"></div>
          <div class="wtp-score-item">
            <div class="wtp-score-val" id="guesses-left" style="color:${leagueColor()};">∞</div>
            <div class="wtp-score-lbl">Guesses Used</div>
          </div>
          <div class="wtp-divider"></div>
          <div class="wtp-score-item">
            <div class="wtp-score-val" style="color:${leagueColor()};">${player.league}</div>
            <div class="wtp-score-lbl">League</div>
          </div>
          <div class="wtp-divider"></div>
          <div class="wtp-score-item">
            <div class="wtp-score-val" style="color:${leagueColor()};">${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
            <div class="wtp-score-lbl">Today's Puzzle</div>
          </div>
        </div>
      </div>
    `;

    renderClues();
    updateRevealBtn();

    // Enter key submits
    document.getElementById('guess-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitGuess();
    });
  }

  function renderClues() {
    const list = document.getElementById('clues-list');
    if (!list) return;
    list.innerHTML = player.clues.map((clue, i) => {
      const isRevealed = i < revealedClues;
      return `
        <div class="wtp-clue ${isRevealed ? 'revealed' : 'locked'}" id="clue-${i}">
          <div class="wtp-clue-num">${i + 1}</div>
          <div class="wtp-clue-content">
            <div class="wtp-clue-label">${clue.label}</div>
            <div class="wtp-clue-text">${isRevealed ? clue.text : '? ? ? ? ?'}</div>
          </div>
          <div class="wtp-pts-badge">${POINT_VALUES[i].toLocaleString()} pts</div>
        </div>
      `;
    }).join('');
    const countEl = document.getElementById('clue-count-display');
    if (countEl) countEl.textContent = `${revealedClues} of 5`;
  }

  function updateRevealBtn() {
    const btn = document.getElementById('reveal-btn');
    if (!btn) return;
    if (revealedClues >= 5) {
      btn.style.display = 'none';
    } else {
      const nextPts = POINT_VALUES[revealedClues];
      btn.textContent = `Reveal Next Clue (max ${nextPts.toLocaleString()} pts after)`;
    }
    const ptsEl = document.getElementById('pts-available');
    if (ptsEl) ptsEl.textContent = POINT_VALUES[Math.min(revealedClues - 1, 4)].toLocaleString();
  }

  function revealNextClue() {
    if (revealedClues >= 5 || gameOver) return;
    revealedClues++;
    pointsAvailable = POINT_VALUES[revealedClues - 1];
    renderClues();
    updateRevealBtn();
  }

  function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById('guess-input');
    const feedback = document.getElementById('guess-feedback');
    const guess = (input.value || '').trim().toLowerCase();
    if (!guess) return;

    guessesUsed++;
    document.getElementById('guesses-left').textContent = guessesUsed;

    const correctName = player.name.toLowerCase();
    const lastName = correctName.split(' ').slice(-1)[0];

    if (guess === correctName || guess === lastName || correctName.includes(guess) && guess.length > 3) {
      gameOver = true;
      won = true;
      markAttemptedLocally(player.id);
      showResult(true, pointsAvailable);
    } else {
      // Check for partial last name
      if (lastName.startsWith(guess) && guess.length >= 3) {
        feedback.textContent = "Getting warmer — try the full name!";
        feedback.className = 'guess-feedback close-guess';
      } else {
        feedback.textContent = `Not quite — try again!`;
        feedback.className = 'guess-feedback wrong-guess';
      }
      input.value = '';
      setTimeout(() => { if (feedback) feedback.textContent = ''; }, 2500);
    }
  }

  async function showResult(correct, pts, isReplay, storedData) {
    if (isReplay && storedData) { correct = storedData.correct; pts = storedData.finalPts || 0; }
    const noData = isReplay && storedData && storedData.noData;
    const fire = isOnFire();
    const finalPts = correct ? (fire && !isReplay ? Math.round(pts * 1.10) : pts) : 0;
    const cluesUsed = isReplay ? (storedData.cluesUsed || 5) : revealedClues;
    const guessesUsedVal = isReplay ? (storedData.guessesUsed || 0) : guessesUsed;
    const emojiResult = correct ? '🎉' : '😔';
    const headline = correct ? 'Correct!' : 'Nice Try!';
    const shareEmoji = correct
      ? ('✅ Guessed in ' + cluesUsed + ' clue' + (cluesUsed !== 1 ? 's' : '') + '!')
      : "❌ Couldn't get it today";
    const shareText = buildShareText(
      "Who's That, Player? (" + player.league + ")",
      finalPts,
      shareEmoji,
      correct ? ('Identified in ' + cluesUsed + '/5 clues') : 'Better luck tomorrow!'
    );
    window._lastShareText = shareText;

    if (!isReplay) {
      // Store FIRST before any async
      storeResult({ correct, finalPts, cluesUsed, guessesUsed: guessesUsedVal });
      markAttemptedLocally(player.id);
      await saveAttempt(player.id, correct ? pts : 0, 0, { cluesUsed, guessesUsed: guessesUsedVal, correct }, 'whos_that_player');
    }

    var cluesHtml = player.clues.map(function(cl) {
      return '<div style="padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">' +
        '<span style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;color:' + leagueColor() + ';margin-right:0.5rem;">' + cl.label + ':</span>' +
        '<span style="color:var(--gray-light);">' + cl.text + '</span>' +
        '</div>';
    }).join('');

    var ptsLine = '';
    if (noData) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;color:var(--gray);margin-bottom:1rem;">Come back tomorrow for a new player!</div>';
    } else if (correct) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1.1rem;color:var(--success);margin-bottom:0.5rem;">+' + finalPts.toLocaleString() + ' pts earned</div>' +
        (fire && !isReplay ? '<div style="font-size:0.8rem;color:#ff6400;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem;">🔥 On Fire bonus applied!</div>' : '');
    } else {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1rem;color:var(--gray);margin-bottom:1.5rem;">Better luck tomorrow!</div>';
    }

    var container = document.getElementById('wtp-container');
    container.innerHTML =
      '<div class="wtp-result ' + (correct ? 'correct' : 'wrong') + '">' +
        '<div style="font-size:3rem;margin-bottom:0.5rem;">' + emojiResult + '</div>' +
        '<div class="wtp-result-main">' + (noData ? 'Already Played!' : headline) + '</div>' +
        ptsLine +
        '<div id="wtp-percentile" style="margin-bottom:1rem;"></div>' +
        '<div class="wtp-player-reveal">' +
          '<img class="wtp-player-img-reveal" src="' + espnImg + '" alt="' + player.name + '" onerror="this.style.opacity=0.3;"/>' +
          '<div>' +
            '<div class="wtp-player-name">' + player.name + '</div>' +
            '<div class="wtp-player-details">' + player.pos + ' · ' + player.team + '<br>' + player.college + '<br>Draft: ' + player.drafted + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;text-align:left;width:100%;max-width:500px;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">All Clues</div>' +
          cluesHtml +
        '</div>' +
        '<div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;">' +
          '<button class="btn btn-primary" onclick="showShareModal(window._lastShareText)">📣 Share Result</button>' +
          '<a href="/" class="btn btn-outline">Back to Games</a>' +
        '</div>' +
        '<div style="border-top:1px solid rgba(52,152,219,0.15);padding-top:1.25rem;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">Try Today's Other Games</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">' +
            '<a href="/daily-quiz.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🎯 Daily Quiz</a>' +
            '<a href="/snap-decision.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🏈 Snap Decision</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Percentile
    try {
      var pct = await getPercentile(player.id, correct ? finalPts : 0);
      var pEl = document.getElementById('wtp-percentile');
      if (pEl && pct !== null && correct) {
        pEl.innerHTML = '<div style="display:inline-block;background:rgba(52,152,219,0.1);border:1px solid rgba(52,152,219,0.3);border-radius:8px;padding:0.5rem 1.25rem;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;color:#3498db;margin-bottom:0.75rem;">Better than ' + pct + '% of players today</div>';
      }
    } catch(e) {}

    if (!isReplay) {
      var user = await getCurrentUser();
      if (!user && correct) {
        setTimeout(function() {
          showPostGameAuthPrompt(player.id, finalPts, 'whos_that_player', "Who's That, Player? (" + player.league + ")");
        }, 800);
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    updateNavAuth();
    var stored = getStoredResult();
    if (stored) {
      // Has stored result — always show end screen
      showResult(stored.correct, stored.finalPts || 0, true, stored);
      return;
    }
    if (hasAttemptedLocally(player.id)) {
      // Played before this update — no stored data, show fallback
      showResult(false, 0, true, { correct: false, finalPts: 0, noData: true });
      return;
    }
    renderGame();
  });

</script>
</body>
</html>
