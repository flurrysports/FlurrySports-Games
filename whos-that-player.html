  <style>
    /* ── LAYOUT: nav is 68px, game fills the rest, no scroll during play ── */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    /* Allow scrolling only on result screen */
    body.wtp-result-active { overflow: auto; }

    nav { flex-shrink: 0; height: 68px; }

    .wtp-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAIN GAME CARD ── */
    .wtp-card {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── TOP BAR (green header) ── */
    .wtp-topbar {
      background: #0DBF7A;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .wtp-topbar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(15px, 4vw, 20px);
      color: #021a0d;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .wtp-topbar-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--navy);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── HERO (silhouette + stats) ── */
    .wtp-hero {
      background: #0a120b;
      border-bottom: 2px solid #0DBF7A;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .wtp-silhouette-box {
      width: clamp(60px, 15vw, 80px);
      height: clamp(60px, 15vw, 80px);
      border-radius: 10px;
      border: 1px solid rgba(13,191,122,0.3);
      background: #061209;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .wtp-silhouette-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: brightness(0) saturate(100%);
    }
    .wtp-silhouette-box .wtp-qmark-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 10vw, 52px);
      color: #0DBF7A;
      opacity: 0.65;
      line-height: 1;
    }
    .wtp-stats-row {
      flex: 1;
      display: flex;
      min-width: 0;
    }
    .wtp-stat {
      flex: 1;
      text-align: center;
      padding: 0 4px;
      border-right: 1px solid #1a2e1f;
    }
    .wtp-stat:last-child { border-right: none; }
    .wtp-stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      color: #0DBF7A;
      line-height: 1;
    }
    .wtp-stat-val.identity {
      font-size: clamp(18px, 4.5vw, 24px);
      opacity: 0.22;
    }
    .wtp-stat-lbl {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(7px, 1.8vw, 9px);
      font-weight: 700;
      color: #2a4a30;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── CLUES LIST ── */
    .wtp-clues-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 8px 12px 4px;
      gap: 4px;
      overflow: hidden;
    }

    .wtp-clue-row {
      display: flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    .wtp-clue-row.active { border-color: #0DBF7A; }

    .wtp-clue-num {
      width: clamp(26px, 7vw, 32px);
      align-self: stretch;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(13px, 3.5vw, 17px);
      color: #222;
      flex-shrink: 0;
    }
    .wtp-clue-row.active .wtp-clue-num {
      background: #0DBF7A;
      color: #021a0d;
    }

    .wtp-clue-inner {
      flex: 1;
      padding: 5px 8px;
      background: #0a0a0a;
      min-width: 0;
    }
    .wtp-clue-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(7px, 1.8vw, 9px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 1px;
    }
    .wtp-clue-row.active .wtp-clue-tag { color: rgba(13,191,122,0.55); }
    .wtp-clue-text {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wtp-clue-row.active .wtp-clue-text { color: rgba(255,255,255,0.88); white-space: normal; }

    .wtp-clue-pts {
      padding: 0 8px;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(11px, 2.8vw, 14px);
      color: #1e3a24;
      border-left: 1px solid #1a1a1a;
      flex-shrink: 0;
      align-self: stretch;
    }
    .wtp-clue-row.active .wtp-clue-pts { color: #0DBF7A; }

    /* ── GUESS FOOTER ── */
    .wtp-guess-footer {
      flex-shrink: 0;
      padding: 8px 12px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid #1a1a1a;
      background: rgba(8,12,46,0.6);
    }
    .wtp-feedback {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      height: 16px;
      margin-bottom: 5px;
    }
    .wtp-feedback.wrong-guess { color: #ff4d6d; }
    .wtp-feedback.close-guess { color: #F5B800; }

    .wtp-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    .wtp-guess-input {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 7px;
      height: 40px;
      padding: 0 12px;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .wtp-guess-input:focus { border-color: rgba(13,191,122,0.4); }
    .wtp-guess-input::placeholder { color: rgba(255,255,255,0.2); }

    .wtp-guess-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 7px;
      background: #0DBF7A;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: #021a0d;
      letter-spacing: 0.06em;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .wtp-guess-btn:hover { background: #0aab6c; }

    .wtp-reveal-btn {
      width: 100%;
      height: 32px;
      border-radius: 7px;
      border: 1px solid #1e3a24;
      background: transparent;
      color: #2a4a30;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .wtp-reveal-btn:hover { border-color: #0DBF7A; color: #0DBF7A; }

    /* ── RESULT SCREEN ── */
    .wtp-result-shell {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1.5rem 1rem 2rem;
    }
    .wtp-result {
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }
    .wtp-result.correct { background: linear-gradient(135deg, #021a02, #080c2e); border: 1px solid rgba(0,214,143,0.3); }
    .wtp-result.wrong   { background: linear-gradient(135deg, #1a0202, #080c2e); border: 1px solid rgba(255,77,109,0.3); }
    .wtp-result-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      text-transform: uppercase;
      line-height: 1;
      margin: 0.5rem 0;
    }
    .wtp-result.correct .wtp-result-main { color: var(--success); }
    .wtp-result.wrong   .wtp-result-main { color: var(--error); }
    .wtp-player-reveal {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin: 1.25rem 0;
      text-align: left;
    }
    .wtp-player-img-reveal { width: 72px; height: 72px; object-fit: cover; object-position: top; border-radius: 10px; }
    .wtp-player-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; text-transform: uppercase; color: var(--white); line-height: 1; }
    .wtp-player-details { font-size: 0.82rem; color: var(--gray); margin-top: 0.3rem; }

    /* ── TECH FOUL OVERLAY ── */
    #tech-foul-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 999999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      font-family: 'Bebas Neue', Arial, sans-serif;
      overflow-y: auto;
    }
    #tech-foul-overlay.active {
      display: flex;
    }
    .tf-whistle { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .tf-title { font-size: clamp(2.5rem, 10vw, 4.5rem); font-weight: 900; color: #E8470A; letter-spacing: 0.05em; text-transform: uppercase; line-height: 1; margin-bottom: 0.5rem; }
    .tf-subtitle { font-size: clamp(1rem, 4vw, 1.3rem); color: #f0f0f8; margin-bottom: 0.5rem; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; }
    .tf-score { font-size: clamp(3rem, 12vw, 5rem); color: #F5B800; line-height: 1; margin-bottom: 0.25rem; }
    .tf-score-label { font-size: 0.85rem; color: #8888aa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2rem; font-family: 'Barlow Condensed', sans-serif; }
    .tf-rule { font-size: 0.9rem; color: #8888aa; margin-bottom: 2rem; max-width: 380px; line-height: 1.5; font-family: 'Barlow', sans-serif; }
    .tf-btn { background: #E8470A; color: #fff; border: none; border-radius: 10px; padding: 12px 36px; font-family: 'Barlow Condensed', Arial, sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-block; }
    .tf-btn:hover { background: #c93d08; }
  </style>
</head>

<script>
function getPacificOffsetMinutes(d) {
    const y = d.getUTCFullYear();
    const marchSecond = new Date(Date.UTC(y, 2, 8, 2, 0, 0));
    marchSecond.setUTCDate(8 + (7 - marchSecond.getUTCDay()) % 7);
    const novFirst = new Date(Date.UTC(y, 10, 1, 2, 0, 0));
    novFirst.setUTCDate(1 + (7 - novFirst.getUTCDay()) % 7);
    return (d >= marchSecond && d < novFirst) ? -420 : -480;
}
function dateSeed() {
    const d = new Date();
    const offset = d.getTime() + getPacificOffsetMinutes(d) * 60000;
    const s = new Date(offset).toISOString().slice(0,10).replace(/-/g,'');
    return parseInt(s);
}

  function shufflePool(arr, seed) {
    var a = arr.slice();
    var s = seed;
    function rng() { s = (s * 9301 + 49297) % 233280; return s / 233280; }
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  var YEAR_SEED = new Date().getUTCFullYear() * 1000;
  var nflShuffled = shufflePool(NFL_PLAYERS, YEAR_SEED + 1);
  var nbaShuffled = shufflePool(NBA_PLAYERS, YEAR_SEED + 2);

  const POINT_VALUES = [1000, 800, 600, 400, 200];

  function getDailyPlayer() {
    var seed = dateSeed();
    var d = new Date();
    var offset = d.getTime() + getPacificOffsetMinutes(d) * 60000;
    var pacDate = new Date(offset).toISOString().slice(0,10);
    var jan1 = new Date(pacDate.slice(0,4) + '-01-01T00:00:00Z');
    var doy = Math.floor((new Date(pacDate + 'T00:00:00Z') - jan1) / 86400000);
    var useNFL = (doy % 2 === 0);
    var pool = useNFL ? nflShuffled : nbaShuffled;
    var idx = Math.floor(doy / 2) % pool.length;
    return Object.assign({}, pool[idx], { league: useNFL ? 'NFL' : 'NBA', id: 'wtp-' + seed });
  }

  const player = getDailyPlayer();

  function getPlayerPhotoUrl(player) {
    if (player.league === 'NBA') {
      var id = player.nbaId || player.espnId;
      return 'https://cdn.nba.com/headshots/nba/latest/1040x760/' + id + '.png';
    } else {
      return 'https://static.www.nfl.com/image/private/t_headshot_desktop/league/players/' + player.espnId;
    }
  }

  function getPlayerPhotoFallback(player) {
    if (player.league === 'NBA') {
      var id = player.nbaId || player.espnId;
      return 'https://cdn.nba.com/headshots/nba/latest/260x190/' + id + '.png';
    } else {
      return 'https://a.espncdn.com/i/headshots/nfl/players/full/' + player.espnId + '.png';
    }
  }

  const espnImg = getPlayerPhotoUrl(player);

  let revealedClues = 1;
  let guessesUsed = 0;
  let gameOver = false;
  let pointsAvailable = POINT_VALUES[0];
  let won = false;

  function leagueColor() { return player.league === 'NFL' ? '#e8a020' : '#0DBF7A'; }
  function leagueBg()    { return player.league === 'NFL' ? 'rgba(232,160,32,0.15)' : 'rgba(13,191,122,0.12)'; }

  var wtpDateKey   = 'wtp_result_' + dateSeed();
  var wtpPlayedKey = 'wtp_played_' + dateSeed();
  function saveWTPResult(data)  { try { localStorage.setItem(wtpDateKey, JSON.stringify(data)); } catch(e) {} }
  function loadWTPResult() {
    try {
      var r = localStorage.getItem(wtpDateKey);
      if (r) return JSON.parse(r);
      var seed = dateSeed();
      var oldKeys = ['fs_wtp_wtp-' + seed, 'fs_wtp_wtp-' + (seed + 166), 'fs_wtp_wtp-' + (seed + 56)];
      for (var i = 0; i < oldKeys.length; i++) {
        var r2 = localStorage.getItem(oldKeys[i]);
        if (r2) { localStorage.setItem(wtpDateKey, r2); return JSON.parse(r2); }
      }
      return null;
    } catch(e) { return null; }
  }
  function markWTPPlayed()  { try { localStorage.setItem(wtpPlayedKey, '1'); } catch(e) {} }
  function hasWTPPlayed() {
    if (localStorage.getItem(wtpPlayedKey) === '1') return true;
    try {
      var seed = dateSeed();
      var attempted = JSON.parse(localStorage.getItem('fs_attempted') || '[]');
      return attempted.includes('wtp-' + seed) || attempted.includes('wtp-' + (seed + 166));
    } catch(e) { return false; }
  }

  function handleImgError(img, espnId, league) {
    var fb = getPlayerPhotoFallback({espnId, league, nbaId: img.dataset.nbaId});
    if (img.src !== fb) { img.src = fb; } else { img.style.display = 'none'; }
  }
  function handleRevealImgError(img, espnId, league) {
    var fb = getPlayerPhotoFallback({espnId, league, nbaId: img.dataset.nbaId});
    if (img.src !== fb) { img.src = fb; } else { img.style.display = 'none'; }
  }

    renderClues();

      if (e.key === 'Enter') submitGuess();

  function renderClues() {
    var list = document.getElementById('clues-list');
    if (!list) return;
    list.innerHTML = player.clues.map((clue, i) => {
      var isRevealed = i < revealedClues;
      return `
        <div class="wtp-clue-row ${isRevealed ? 'active' : ''}" id="clue-${i}">
          <div class="wtp-clue-num">${i + 1}</div>
          <div class="wtp-clue-inner">
            <div class="wtp-clue-tag">${clue.label}</div>
            <div class="wtp-clue-text">${isRevealed ? clue.text : 'Locked'}</div>
          </div>
          <div class="wtp-clue-pts">${POINT_VALUES[i].toLocaleString()}</div>
        </div>
      `;
    }).join('');
  }

  function updateRevealBtn() {
    var btn = document.getElementById('reveal-btn');
    if (!btn) return;
    if (revealedClues >= 5) {
      btn.style.display = 'none';
    } else {
      var nextPts = POINT_VALUES[revealedClues];
      btn.textContent = `Reveal Clue ${revealedClues + 1} · max ${nextPts.toLocaleString()} pts after`;
    }
    var ptsEl = document.getElementById('pts-available');
    if (ptsEl) ptsEl.textContent = POINT_VALUES[Math.min(revealedClues - 1, 4)].toLocaleString();
  }

  function revealNextClue() {
    if (revealedClues >= 5 || gameOver) return;
    revealedClues++;
    pointsAvailable = POINT_VALUES[revealedClues - 1];
    renderClues();
    updateRevealBtn();
  }

  function submitGuess() {
    if (gameOver) return;
    var input    = document.getElementById('guess-input');
    var feedback = document.getElementById('guess-feedback');
    var guess = (input.value || '').trim().toLowerCase();
    if (!guess) return;

    guessesUsed++;
    var gl = document.getElementById('guesses-left');
    if (gl) gl.textContent = guessesUsed;

    var correctName = player.name.toLowerCase();
    var lastName    = correctName.split(' ').slice(-1)[0];

    if (guess === correctName || guess === lastName || (correctName.includes(guess) && guess.length > 3)) {
      gameOver = true;
      won = true;
      markAttemptedLocally(player.id);
      showResult(true, pointsAvailable);
    } else {
      input.value = '';
      if (revealedClues >= 5) {
        gameOver = true;
        feedback.textContent = 'Out of clues — the answer was ' + player.name + '!';
        feedback.className = 'wtp-feedback wrong-guess';
        setTimeout(function() { showResult(false, 0); }, 1500);
      } else {
        feedback.textContent = 'Wrong — revealing next clue!';
        feedback.className = 'wtp-feedback wrong-guess';
        setTimeout(function() {
          if (feedback) { feedback.textContent = ''; feedback.className = 'wtp-feedback'; }
          revealedClues++;
          pointsAvailable = POINT_VALUES[revealedClues - 1];
          renderClues();
          updateRevealBtn();
        }, 1000);
      }
    }
  }

  async function showResult(correct, pts, isReplay, storedData) {
    // Switch body to scrollable for result screen
    document.body.classList.add('wtp-result-active');

    if (isReplay && storedData) { correct = storedData.correct; pts = storedData.finalPts || 0; }
    var noData = isReplay && storedData && storedData.noData;
    var fire = isOnFire();
    var finalPts   = correct ? (fire && !isReplay ? Math.round(pts * 1.10) : pts) : 0;
    var cluesUsed  = isReplay ? (storedData.cluesUsed || 5) : revealedClues;
    var guessesUsedVal = isReplay ? (storedData.guessesUsed || 0) : guessesUsed;
    var emojiResult = correct ? '🎉' : '😔';
    var headline    = correct ? 'Correct!' : 'Nice Try!';
    var shareEmoji  = correct
      ? ('✅ Guessed in ' + cluesUsed + ' clue' + (cluesUsed !== 1 ? 's' : '') + '!')
      : "❌ Couldn't get it today";
    var shareText = buildShareText(
      "Who's That, Player? (" + player.league + ")",
      finalPts,
      shareEmoji,
      correct ? ('Identified in ' + cluesUsed + '/5 clues') : 'Better luck tomorrow!'
    );
    window._lastShareText = shareText;

    if (!isReplay) {
      saveWTPResult({ correct, finalPts, cluesUsed, guessesUsed: guessesUsedVal });
      markWTPPlayed();
      updateStreak();
      await saveAttempt(player.id, correct ? pts : 0, 0, { cluesUsed, guessesUsed: guessesUsedVal, correct }, 'whos_that_player');
    }

    var cluesHtml = player.clues.map(function(cl) {
      return '<div style="padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">' +
        '<span style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;color:' + leagueColor() + ';margin-right:0.5rem;">' + cl.label + ':</span>' +
        '<span style="color:var(--gray-light);">' + cl.text + '</span></div>';
    }).join('');

    var ptsLine = '';
    if (noData) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;color:var(--gray);margin-bottom:1rem;">Come back tomorrow for a new player!</div>';
    } else if (correct) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1.1rem;color:var(--success);margin-bottom:0.5rem;">+' + finalPts.toLocaleString() + ' pts earned</div>' +
        (fire && !isReplay ? '<div style="font-size:0.8rem;color:#ff6400;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem;">🔥 On Fire bonus applied!</div>' : '');
    } else {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1rem;color:var(--gray);margin-bottom:1.5rem;">Better luck tomorrow!</div>';
    }

    var container = document.getElementById('wtp-container');
    container.innerHTML =
      '<div class="wtp-result-shell"><div class="wtp-result ' + (correct ? 'correct' : 'wrong') + '">' +
        '<div style="font-size:3rem;margin-bottom:0.5rem;">' + emojiResult + '</div>' +
        '<div class="wtp-result-main">' + (noData ? 'Already Played!' : headline) + '</div>' +
        ptsLine +
        '<div id="wtp-percentile" style="margin-bottom:1rem;"></div>' +
        '<div class="wtp-player-reveal">' +
          '<img class="wtp-player-img-reveal" src="' + espnImg + '" data-nba-id="' + (player.nbaId || '') + '" alt="' + player.name + '" onerror="handleRevealImgError(this, \'' + player.espnId + '\', \'' + player.league + '\')"/>' +
          '<div>' +
            '<div class="wtp-player-name">' + player.name + '</div>' +
            '<div class="wtp-player-details">' + player.pos + ' · ' + player.team + '<br>' + player.college + '<br>Draft: ' + player.drafted + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;text-align:left;width:100%;max-width:500px;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">All Clues</div>' +
          cluesHtml +
        '</div>' +
        buildShareSection("Who\'s That, Player? (" + player.league + ')', finalPts, correct ? ('Guessed in ' + cluesUsed + ' clues') : 'Better luck tomorrow!') +
        '<div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin:1rem 0;">' +
          '<a href="/" class="btn btn-outline">Back to Games</a>' +
        '</div>' +
        '<div style="border-top:1px solid rgba(13,191,122,0.15);padding-top:1.25rem;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">Try Today\'s Other Games</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">' +
            '<a href="/daily-quiz.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🎯 Daily Quiz</a>' +
            '<a href="/snap-decision.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🏈 Snap Decision</a>' +
          '</div>' +
        '</div>' +
      '</div></div>';

    try {
      var pct = await getPercentile(player.id, correct ? finalPts : 0);
      var pEl = document.getElementById('wtp-percentile');
      if (pEl && pct !== null && correct) {
        pEl.innerHTML = '<div style="display:inline-block;background:rgba(13,191,122,0.1);border:1px solid rgba(13,191,122,0.3);border-radius:8px;padding:0.5rem 1.25rem;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;color:#0DBF7A;margin-bottom:0.75rem;">Better than ' + pct + '% of players today</div>';
      }
    } catch(e) {}

    if (!isReplay) {
      var user = await getCurrentUser();
      if (!user && correct) {
        setTimeout(function() {
          showPostGameAuthPrompt(player.id, finalPts, 'whos_that_player', "Who's That, Player? (" + player.league + ")");
        }, 800);
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    updateNavAuth();

    var stored = loadWTPResult();
    if (stored) {
      document.body.classList.add('wtp-result-active');
      showResult(stored.correct, stored.finalPts || 0, true, stored);
      return;
    }

    if (hasWTPPlayed()) {
      document.body.classList.add('wtp-result-active');
      showResult(false, 0, true, { correct: false, finalPts: 0, noData: true });
      return;
    }

    // Try to get worker-validated photo URL from Supabase first
    (async function() {
      try {
        var today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
        var res = await fetch(
          SUPABASE_URL + '/rest/v1/wtp_daily?date=eq.' + today + '&select=photo_url',
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
        );
        if (res.ok) {
          var rows = await res.json();
          if (rows && rows.length > 0 && rows[0].photo_url) {
            window._wtpValidatedPhoto = rows[0].photo_url;
          }
        }
      } catch(e) { /* silently fall back to CDN guessing */ }
      renderGame();
    })();
  });

</script>
<script>
// ── TECHNICAL FOUL ──
(function() {
  var _tfTriggered = false;

  function _isGameActive() {
    try { return typeof gameOver !== 'undefined' && !gameOver && typeof revealedClues !== 'undefined' && revealedClues >= 1; } catch(e) { return false; }
  }
  function _getCurrentScore() {
    try { return typeof pointsAvailable !== 'undefined' ? pointsAvailable : 0; } catch(e) { return 0; }
  }
  function _endGame() {
    try { if(typeof gameOver!=='undefined'){gameOver=true;} } catch(e) {}
  }
  function _showTechFoul() {
    if (_tfTriggered) return;
    if (!_isGameActive()) return;
    _tfTriggered = true;
    var score = _getCurrentScore();
    _endGame();
    var el = document.getElementById('tf-final-score');
    if (el) el.textContent = score.toLocaleString();
    var overlay = document.getElementById('tech-foul-overlay');
    if (overlay) { overlay.style.cssText = 'display:flex !important; position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100% !important; height:100% !important; min-height:100vh !important; z-index:999999 !important; background:rgba(0,0,0,0.95) !important; align-items:center !important; justify-content:center !important; flex-direction:column !important; text-align:center !important; padding:2rem !important; box-sizing:border-box !important;'; overlay.classList.add('active'); }
    try {
      if (typeof saveAttempt === 'function') saveAttempt(typeof todayGameId !== 'undefined' ? todayGameId : 'wtp-forfeit', score, 0, { forfeit: true }, 'whos_that_player');
      try { localStorage.setItem('wtp_played_' + (typeof seed !== 'undefined' ? seed : ''), '1'); } catch(e2) {}
    } catch(e) {}
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') _showTechFoul();
  });
  window.addEventListener('pagehide', function() { _showTechFoul(); });
  window.addEventListener('blur', function() {
    setTimeout(function() {
      if (document.visibilityState === 'hidden' || !document.hasFocus()) _showTechFoul();
    }, 400);
  });
})();
</script>
<script>
// ── BACK BUTTON ──
(function() {
  var _gameStarted = false;
  function _pushState() {
    if (!_gameStarted) { _gameStarted = true; history.pushState({ wtpPlaying: true }, '', window.location.href); }
  }
  window.addEventListener('popstate', function(e) {
    if (!_gameStarted) return;
    if (typeof gameOver !== 'undefined' && gameOver) return;
    var atStart = typeof revealedClues !== 'undefined' && revealedClues === 1 && typeof guessesUsed !== 'undefined' && guessesUsed === 0;
    if (atStart) {
      window.location.reload();
    } else {
      history.pushState({ wtpPlaying: true }, '', window.location.href);
      if (typeof gameOver !== 'undefined') gameOver = true;
      try { localStorage.setItem('wtp_played_' + (typeof seed !== 'undefined' ? seed : ''), '1'); } catch(e) {}
      if (typeof showResult === 'function') showResult(false, 0, false, null);
    }
  });
  var _wtpObserver = new MutationObserver(function() {
    var gameArea = document.getElementById('wtp-container');
    if (gameArea && gameArea.querySelector('.wtp-clues-section')) { _pushState(); _wtpObserver.disconnect(); }
  });
  _wtpObserver.observe(document.body, { childList: true, subtree: true });
})();
</script>
