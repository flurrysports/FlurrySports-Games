function getPacificOffsetMinutes(d) {
    const y = d.getUTCFullYear();
    const dstStart = new Date(Date.UTC(y, 2, 14 - (new Date(Date.UTC(y, 2, 1)).getUTCDay() + 6) % 7, 10));
    const dstEnd   = new Date(Date.UTC(y, 10, 7  - (new Date(Date.UTC(y, 10, 1)).getUTCDay() + 6) % 7, 9));
    return (d >= dstStart && d < dstEnd) ? -7*60 : -8*60;
  }
  function dateSeed() {
    const d = new Date();
    const ms = getPacificOffsetMinutes(d) * 60000;
    const pac = new Date(d.getTime() + ms);
    return parseInt(pac.toISOString().slice(0,10).replace(/-/g,''));
  }
  function seededRandom(seed) {
    let s = seed;
    return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  }

  function handleImgError(img, espnId, league) {
    var tried = img.dataset.fallback || '0';
    if (tried === '0' && espnId) {
      img.dataset.fallback = '1';
      if (league === 'NBA') {
        var nbaId = img.dataset.nbaId || espnId;
        img.src = 'https://cdn.nba.com/headshots/nba/latest/260x190/' + nbaId + '.png';
      } else {
        img.src = 'https://a.espncdn.com/i/headshots/nfl/players/full/' + espnId + '.png';
      }
    } else {
      img.style.display = 'none';
      var svg = document.getElementById('fallback-svg');
      if (svg) svg.style.display = 'block';
    }
  }

  // ── Shuffle-based rotation: no repeat for 50 days per league ────
  function shufflePool(arr, seed) {
    var a = arr.slice();
    var s = seed;
    function rng() { s = (s * 9301 + 49297) % 233280; return s / 233280; }
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  var YEAR_SEED = new Date().getUTCFullYear() * 1000;
  var nflShuffled = shufflePool(NFL_PLAYERS, YEAR_SEED + 1);
  var nbaShuffled = shufflePool(NBA_PLAYERS, YEAR_SEED + 2);

  const POINT_VALUES = [1000, 800, 600, 400, 200];

  function getDailyPlayer() {
    var seed = dateSeed();
    var d = new Date();
    var offset = d.getTime() + getPacificOffsetMinutes(d) * 60000;
    var pacDate = new Date(offset).toISOString().slice(0,10);
    var jan1 = new Date(pacDate.slice(0,4) + '-01-01T00:00:00Z');
    var doy = Math.floor((new Date(pacDate + 'T00:00:00Z') - jan1) / 86400000);
    var useNFL = (doy % 2 === 0);
    var pool = useNFL ? nflShuffled : nbaShuffled;
    var idx = Math.floor(doy / 2) % pool.length;
    return Object.assign({}, pool[idx], { league: useNFL ? 'NFL' : 'NBA', id: 'wtp-' + seed });
  }

  const player = getDailyPlayer();

  // Photo URLs — use official league CDNs, not ESPN (ESPN blocks hotlinking)
  // NBA: cdn.nba.com uses NBA.com PERSON_IDs (nbaId field)
  // NFL: static.www.nfl.com uses ESPN IDs (works reliably for NFL)
  function getPlayerPhotoUrl(player) {
    if (player.league === 'NBA') {
      var id = player.nbaId || player.espnId;
      return 'https://cdn.nba.com/headshots/nba/latest/1040x760/' + id + '.png';
    } else {
      // NFL CDN — reliable, no hotlink blocking
      return 'https://static.www.nfl.com/image/private/t_headshot_desktop/league/players/' + player.espnId;
    }
  }

  function getPlayerPhotoFallback(player) {
    if (player.league === 'NBA') {
      // NBA fallback: smaller size
      var id = player.nbaId || player.espnId;
      return 'https://cdn.nba.com/headshots/nba/latest/260x190/' + id + '.png';
    } else {
      // NFL fallback: ESPN direct URL
      return 'https://a.espncdn.com/i/headshots/nfl/players/full/' + player.espnId + '.png';
    }
  }

  const espnImg = getPlayerPhotoUrl(player);

  let revealedClues = 1;
  let guessesUsed = 0;
  let gameOver = false;
  let pointsAvailable = POINT_VALUES[0];
  let won = false;

  function leagueColor() {
    if (player.league === 'NFL') return '#e8a020';
    if (player.league === 'MLB') return '#e84040';
    return '#0DBF7A'; // NBA default
  }
  function leagueBg() {
    if (player.league === 'NFL') return 'rgba(232,160,32,0.15)';
    if (player.league === 'MLB') return 'rgba(232,64,64,0.15)';
    return 'rgba(13,191,122,0.12)'; // NBA default
  }

  // Date-based storage keys — survive any seed formula changes
  var wtpDateKey = 'wtp_result_' + dateSeed();
  var wtpPlayedKey = 'wtp_played_' + dateSeed();
  function saveWTPResult(data) {
    try { localStorage.setItem(wtpDateKey, JSON.stringify(data)); } catch(e) {}
  }
  function loadWTPResult() {
    try {
      var r = localStorage.getItem(wtpDateKey);
      if (r) return JSON.parse(r);
      // Check all old key formats
      var seed = dateSeed();
      var oldKeys = [
        'fs_wtp_wtp-' + seed,
        'fs_wtp_wtp-' + (seed + 166),
        'fs_wtp_wtp-' + (seed + 56),
      ];
      for (var i = 0; i < oldKeys.length; i++) {
        var r2 = localStorage.getItem(oldKeys[i]);
        if (r2) { localStorage.setItem(wtpDateKey, r2); return JSON.parse(r2); }
      }
      return null;
    } catch(e) { return null; }
  }
  function markWTPPlayed() {
    try { localStorage.setItem(wtpPlayedKey, '1'); } catch(e) {}
  }
  function hasWTPPlayed() {
    if (localStorage.getItem(wtpPlayedKey) === '1') return true;
    try {
      var seed = dateSeed();
      var attempted = JSON.parse(localStorage.getItem('fs_attempted') || '[]');
      return attempted.includes('wtp-' + seed) || attempted.includes('wtp-' + (seed + 166));
    } catch(e) { return false; }
  }

  function renderGame() {
    // Use AI-generated player from Supabase if available
    if (window._wtpPlayerOverride) {
      Object.assign(player, window._wtpPlayerOverride);
      // Use the proper game ID without overwriting player photo ID fields
      if (window._wtpGameId) player.id = window._wtpGameId;
    }
    const container = document.getElementById('wtp-container');
    container.innerHTML = `
      <div class="wtp-topbar">
        <div class="wtp-topbar-title">Who's That, Player?</div>
        <div class="wtp-topbar-badge" style="color:${leagueColor()}">${player.league} · ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>

      <div class="wtp-hero">
        <div class="wtp-silhouette-box" id="sil-box">
          <img class="wtp-player-img" id="silhouette-img"
            src="${window._wtpValidatedPhoto || espnImg}"
            alt="mystery player"
            data-nba-id="${player.nbaId || ''}"
            onerror="handleImgError(this, '${player.espnId}', '${player.league}')"
            style="filter:brightness(0) saturate(100%);"
          />
        </div>
        <div class="wtp-stats-row">
          <div class="wtp-stat">
            <div class="wtp-stat-val" id="pts-available" style="color:${leagueColor()};">${POINT_VALUES[0].toLocaleString()}</div>
            <div class="wtp-stat-lbl">pts avail</div>
          </div>
          <div class="wtp-stat">
            <div class="wtp-stat-val" id="guesses-left" style="color:${leagueColor()};">0</div>
            <div class="wtp-stat-lbl">guesses</div>
          </div>
          <div class="wtp-stat">
            <div class="wtp-stat-val identity" style="color:${leagueColor()}">???</div>
            <div class="wtp-stat-lbl">identity</div>
          </div>
        </div>
      </div>

      <div class="wtp-clues-section" id="clues-list"></div>
      <div class="wtp-spacer"></div>
      <div class="wtp-guess-section">
        <div class="guess-feedback" id="guess-feedback"></div>
        <div class="wtp-guess-row">
          <input class="wtp-guess-input" id="guess-input" type="text" placeholder="Type a player name..." autocomplete="off" />
          <button class="wtp-guess-btn" onclick="submitGuess()">Guess</button>
        </div>
        <button class="wtp-reveal-btn" id="reveal-btn" onclick="revealNextClue()">
          Reveal Clue 2 · max ${POINT_VALUES[1].toLocaleString()} pts after
        </button>
      </div>
    `
    renderClues();
    updateRevealBtn();

    // Enter key submits
    document.getElementById('guess-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitGuess();
    });
  }

  function renderClues() {
    const list = document.getElementById('clues-list');
    if (!list) return;
    list.innerHTML = player.clues.map((clue, i) => {
      const isRevealed = i < revealedClues;
      return `
        <div class="wtp-clue ${isRevealed ? 'revealed' : 'locked'}" id="clue-${i}">
          <div class="wtp-clue-num">${i + 1}</div>
          <div class="wtp-clue-content">
            <div class="wtp-clue-label">${clue.label}</div>
            <div class="wtp-clue-text">${isRevealed ? clue.text : 'Locked'}</div>
          </div>
          <div class="wtp-pts-badge">${POINT_VALUES[i].toLocaleString()}</div>
        </div>
      `;
    }).join('');
  }

  function updateRevealBtn() {
    const btn = document.getElementById('reveal-btn');
    if (!btn) return;
    if (revealedClues >= 5) {
      btn.style.display = 'none';
    } else {
      const nextPts = POINT_VALUES[revealedClues];
      btn.textContent = `Reveal Clue ${revealedClues + 1} · max ${nextPts.toLocaleString()} pts after`;
    }
    const ptsEl = document.getElementById('pts-available');
    if (ptsEl) ptsEl.textContent = POINT_VALUES[Math.min(revealedClues - 1, 4)].toLocaleString();
  }

  function revealNextClue() {
    if (revealedClues >= 5 || gameOver) return;
    revealedClues++;
    pointsAvailable = POINT_VALUES[revealedClues - 1];
    renderClues();
    updateRevealBtn();
  }

  function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById('guess-input');
    const feedback = document.getElementById('guess-feedback');
    const guess = (input.value || '').trim().toLowerCase();
    if (!guess) return;

    guessesUsed++;
    document.getElementById('guesses-left').textContent = guessesUsed;

    const correctName = player.name.toLowerCase();
    const lastName = correctName.split(' ').slice(-1)[0];

    if (guess === correctName || guess === lastName || correctName.includes(guess) && guess.length > 3) {
      gameOver = true;
      won = true;
      markAttemptedLocally(player.id);
      showResult(true, pointsAvailable);
    } else {
      // Wrong guess — reveal next clue (or end game if on last clue)
      input.value = '';
      if (revealedClues >= 5) {
        // On last clue — wrong guess = loss
        gameOver = true;
        feedback.textContent = 'Out of clues — the answer was ' + player.name + '!';
        feedback.className = 'guess-feedback wrong-guess';
        setTimeout(function() { showResult(false, 0); }, 1500);
      } else {
        // Reveal next clue automatically
        feedback.textContent = 'Wrong — revealing next clue!';
        feedback.className = 'guess-feedback wrong-guess';
        setTimeout(function() {
          if (feedback) feedback.textContent = '';
          revealedClues++;
          pointsAvailable = POINT_VALUES[revealedClues - 1];
          renderClues();
          updateRevealBtn();
        }, 1000);
      }
    }
  }

  async function showResult(correct, pts, isReplay, storedData) {
    if (isReplay && storedData) { correct = storedData.correct; pts = storedData.finalPts || 0; }
    const noData = isReplay && storedData && storedData.noData;
    const fire = isOnFire();
    const finalPts = correct ? (fire && !isReplay ? Math.round(pts * 1.10) : pts) : 0;
    const cluesUsed = isReplay ? (storedData.cluesUsed || 5) : revealedClues;
    const guessesUsedVal = isReplay ? (storedData.guessesUsed || 0) : guessesUsed;
    const emojiResult = correct ? '🎉' : '😔';
    const headline = correct ? 'Correct!' : 'Nice Try!';
    const shareEmoji = correct
      ? ('✅ Guessed in ' + cluesUsed + ' clue' + (cluesUsed !== 1 ? 's' : '') + '!')
      : "❌ Couldn't get it today";
    const shareText = buildShareText(
      "Who's That, Player? (" + player.league + ")",
      finalPts,
      shareEmoji,
      correct ? ('Identified in ' + cluesUsed + '/5 clues') : 'Better luck tomorrow!'
    );
    window._lastShareText = shareText;

    if (!isReplay) {
      // Store FIRST before any async
      saveWTPResult({ correct, finalPts, cluesUsed, guessesUsed: guessesUsedVal });
      markWTPPlayed();
      updateStreak();
      await saveAttempt(player.id, correct ? pts : 0, 0, { cluesUsed, guessesUsed: guessesUsedVal, correct }, 'whos_that_player');
    }

    var cluesHtml = player.clues.map(function(cl) {
      return '<div style="padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;">' +
        '<span style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;color:' + leagueColor() + ';margin-right:0.5rem;">' + cl.label + ':</span>' +
        '<span style="color:var(--gray-light);">' + cl.text + '</span>' +
        '</div>';
    }).join('');

    var ptsLine = '';
    if (noData) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;color:var(--gray);margin-bottom:1rem;">Come back tomorrow for a new player!</div>';
    } else if (correct) {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1.1rem;color:var(--success);margin-bottom:0.5rem;">+' + finalPts.toLocaleString() + ' pts earned</div>' +
        (fire && !isReplay ? '<div style="font-size:0.8rem;color:#ff6400;font-family:Barlow Condensed,sans-serif;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem;">🔥 On Fire bonus applied!</div>' : '');
    } else {
      ptsLine = '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:1rem;color:var(--gray);margin-bottom:1.5rem;">Better luck tomorrow!</div>';
    }

    document.body.classList.add('wtp-result-active');
    var container = document.getElementById('wtp-container');
    container.innerHTML =
      '<div class="wtp-result-shell"><div class="wtp-result ' + (correct ? 'correct' : 'wrong') + '">' +
        '<div style="font-size:3rem;margin-bottom:0.5rem;">' + emojiResult + '</div>' +
        '<div class="wtp-result-main">' + (noData ? 'Already Played!' : headline) + '</div>' +
        ptsLine +
        '<div id="wtp-percentile" style="margin-bottom:1rem;"></div>' +
        '<div class="wtp-player-reveal">' +
          '<img class="wtp-player-img-reveal" src="' + (window._wtpValidatedPhoto || espnImg) + '" data-nba-id="' + (player.nbaId || '') + '" alt="' + player.name + '" onerror="handleRevealImgError(this, \'' + player.espnId + '\', \'' + player.league + '\')"/>' +
          '<div>' +
            '<div class="wtp-player-name">' + player.name + '</div>' +
            '<div class="wtp-player-details">' + player.pos + ' · ' + player.team + '<br>' + player.college + '<br>Draft: ' + player.drafted + '</div>' +
          '</div>' +
        '</div>' +
        '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;text-align:left;width:100%;max-width:500px;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">All Clues</div>' +
          cluesHtml +
        '</div>' +
        buildShareSection("Who's That, Player? (" + player.league + ')', finalPts, correct ? ('Guessed in ' + cluesUsed + ' clues') : 'Better luck tomorrow!') +
        '<div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin:1rem 0;">' +
          '<a href="/" class="btn btn-outline">Back to Games</a>' +
        '</div>' +
        '<div style="border-top:1px solid rgba(13,191,122,0.15);padding-top:1.25rem;">' +
          '<div style="font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:0.75rem;">Try Today&#39;s Other Games</div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">' +
            '<a href="/daily-quiz.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🎯 Daily Quiz</a>' +
            '<a href="/snap-decision.html" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0.875rem;text-decoration:none;color:var(--white);font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;text-align:center;">🏈 Snap Decision</a>' +
          '</div>' +
        '</div>' +
      '</div></div>';

    // Percentile
    try {
      var pct = await getPercentile(player.id, correct ? finalPts : 0);
      var pEl = document.getElementById('wtp-percentile');
      if (pEl && pct !== null && correct) {
        pEl.innerHTML = '<div style="display:inline-block;background:rgba(13,191,122,0.1);border:1px solid rgba(13,191,122,0.3);border-radius:8px;padding:0.5rem 1.25rem;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:0.08em;text-transform:uppercase;color:#0DBF7A;margin-bottom:0.75rem;">Better than ' + pct + '% of players today</div>';
      }
    } catch(e) {}

    if (!isReplay) {
      var user = await getCurrentUser();
      if (!user && correct) {
        setTimeout(function() {
          showPostGameAuthPrompt(player.id, finalPts, 'whos_that_player', "Who's That, Player? (" + player.league + ")");
        }, 800);
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    updateNavAuth();

    // Check localStorage for today's result — instant, no network
    var stored = loadWTPResult();
    if (stored) {
      showResult(stored.correct, stored.finalPts || 0, true, stored);
      return;
    }

    // If played today but result missing
    if (hasWTPPlayed()) {
      showResult(false, 0, true, { correct: false, finalPts: 0, noData: true });
      return;
    }

    // Fetch today's AI-generated player from Supabase first
    // Falls back to hardcoded list if the worker hasn't run yet
    (async function() {
      try {
        var today = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
        var { data: rows, error } = await window.supabase
          .from('wtp_daily')
          .select('player_json, photo_url')
          .eq('date', today)
          .limit(1);
        if (!error && rows && rows.length > 0 && rows[0].player_json) {
          var p = rows[0].player_json;
          // Store game ID separately — do NOT set p.id as it conflicts with nbaId/mlbId lookups
          window._wtpGameId = 'wtp-' + today.replace(/-/g, '');
          window._wtpPlayerOverride = p;
          if (rows[0].photo_url) window._wtpValidatedPhoto = rows[0].photo_url;
        }
      } catch(e) { /* fall back to hardcoded player */ }
      renderGame();
    })();
  });

</script>
<script>
// ── TECHNICAL FOUL: fires when player leaves the game ──
(function() {
  var _tfTriggered = false;

  function _isGameActive() {
    try { return typeof gameOver !== 'undefined' && !gameOver && typeof revealedClues !== 'undefined' && revealedClues >= 1; } catch(e) { return false; }
  }

  function _getCurrentScore() {
    try { return typeof pointsAvailable !== 'undefined' ? pointsAvailable : 0; } catch(e) { return 0; }
  }

  function _endGame() {
    try { if(typeof gameOver!=='undefined'){gameOver=true;} } catch(e) {}
  }

  function _showTechFoul() {
    if (_tfTriggered) return;
    if (!_isGameActive()) return;
    _tfTriggered = true;
    var score = _getCurrentScore();
    _endGame();
    var el = document.getElementById('tf-final-score');
    if (el) el.textContent = score.toLocaleString();
    var overlay = document.getElementById('tech-foul-overlay');
    if (overlay) { overlay.style.cssText = 'display:flex !important; position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100% !important; height:100% !important; min-height:100vh !important; z-index:999999 !important; background:rgba(0,0,0,0.95) !important; align-items:center !important; justify-content:center !important; flex-direction:column !important; text-align:center !important; padding:2rem !important; box-sizing:border-box !important;'; overlay.classList.add('active'); }
    // Save forfeit for WTP
    try {
      if (typeof saveAttempt === 'function') saveAttempt(typeof todayGameId !== 'undefined' ? todayGameId : 'wtp-forfeit', score, 0, { forfeit: true }, 'whos_that_player');
      try { localStorage.setItem('wtp_played_' + (typeof seed !== 'undefined' ? seed : ''), '1'); } catch(e2) {}
    } catch(e) {}
  }

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') _showTechFoul();
  });

  window.addEventListener('pagehide', function() { _showTechFoul(); });

  window.addEventListener('blur', function() {
    setTimeout(function() {
      if (document.visibilityState === 'hidden' || !document.hasFocus()) _showTechFoul();
    }, 400);
  });
})();
</script>

<script>
// ── BACK BUTTON: 25% rule for Who's That Player ──
(function() {
  var _gameStarted = false;

  function _pushState() {
    if (!_gameStarted) {
      _gameStarted = true;
      history.pushState({ wtpPlaying: true }, '', window.location.href);
    }
  }

  window.addEventListener('popstate', function(e) {
    if (!_gameStarted) return;
    if (typeof gameOver !== 'undefined' && gameOver) return;
    // revealedClues === 1 and no guess used = before 25%
    var atStart = typeof revealedClues !== 'undefined' && revealedClues === 1 && typeof guessesUsed !== 'undefined' && guessesUsed === 0;
    if (atStart) {
      window.location.reload();
    } else {
      history.pushState({ wtpPlaying: true }, '', window.location.href);
      // End the game with score 0 — they left mid-game
      if (typeof gameOver !== 'undefined') gameOver = true;
      try { localStorage.setItem('wtp_played_' + (typeof seed !== 'undefined' ? seed : ''), '1'); } catch(e) {}
      if (typeof showResult === 'function') showResult(false, 0, false, null);
    }
  });

  // Push state when game renders (player object exists)
  var _wtpObserver = new MutationObserver(function(mutations) {
    var gameArea = document.getElementById('wtp-game-area') || document.querySelector('.wtp-silhouette-panel');
    if (gameArea) { _pushState(); _wtpObserver.disconnect(); }
  });
  _wtpObserver.observe(document.body, { childList: true, subtree: true });
})();
</script>
