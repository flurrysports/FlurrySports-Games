name = "clean-sweep-generator"
main = "clean-sweep-worker.js"
compatibility_date = "2024-01-01"

# 8:00 AM UTC = midnight Pacific Standard Time (UTC-8)
# During Daylight Saving (UTC-7) this fires at 1:00 AM Pacific — close enough
# Cloudflare Workers cron doesn't support dynamic timezone offsets
[triggers]
crons = ["0 8 * * *"]

# Set ALL THREE of these as secrets in the Cloudflare dashboard:
#   Dashboard → Workers & Pages → clean-sweep-generator → Settings → Variables
#   Add as "Secret" (encrypted), not plain text
#
# ANTHROPIC_API_KEY  = your Anthropic API key
# SUPABASE_URL       = https://sseikmeeiwfhousepsbs.supabase.co
# SUPABASE_SERVICE_KEY = your Supabase service role key (NOT the anon key)
#
# Never put actual values in this file — it gets committed to git
